name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Convex + Build
        run: npx convex deploy --cmd 'npm run build'
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_TRIBE_LAT: ${{ secrets.VITE_TRIBE_LAT }}
          VITE_TRIBE_LNG: ${{ secrets.VITE_TRIBE_LNG }}
          VITE_ADSENSE_PUB_ID: ${{ secrets.VITE_ADSENSE_PUB_ID }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          npm install -g vercel
          URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --env VITE_CONVEX_URL=${{ secrets.VITE_CONVEX_URL }} \
            --env VITE_TRIBE_LAT=${{ secrets.VITE_TRIBE_LAT }} \
            --env VITE_TRIBE_LNG=${{ secrets.VITE_TRIBE_LNG }} \
            --env VITE_ADSENSE_PUB_ID=${{ secrets.VITE_ADSENSE_PUB_ID }})
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment deploy URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: "🔥 Deployed to ${{ steps.deploy.outputs.url }}"
